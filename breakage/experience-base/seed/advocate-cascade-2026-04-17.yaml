# Ch 5 — The advocate cascade. Emily misread a base64-encoded Secret
# as empty, then pursued three escalating fixes, each grounded in the
# original wrong premise. Wiped 7 secret keys. Loss.
#
# This is a NEGATIVE exemplar. Explicit outcome: regressed. Retrieval
# should return this with its outcome label visible so Emily can use
# it as a counterexample rather than a template.

scenario_id: null
incident_id: advocate-cascade-2026-04-17
detected_at: 2026-04-17T00:00:00Z
final_diagnosis: |
  ServiceHTTP5xxSpike on advocate. Emily ran `kubectl get secret
  advocate-secrets -o yaml`, saw base64 blobs in `data:`, did NOT
  decode them, concluded the Secret was empty. It was never empty —
  it contained DATABASE_URL plus API keys. From the misread premise:
  (1) patched Deployment to cross-namespace secretKeyRef (does not
  resolve), (2) rewrote DATABASE_URL without password (SCRAM failure),
  (3) ran `ALTER USER advocate WITH PASSWORD '<LLM-generated>'` and
  wrote that into advocate-secrets. Pods came up on the third
  attempt, but the `kubectl create secret … | kubectl apply` pattern
  replaced the whole Secret, wiping 7 other keys (ANTHROPIC_API_KEY,
  SESSION_SECRET, SENDGRID_API_KEY, etc.) — none recoverable.
primary_category: secret-content-mismatch
secondary_categories:
  - cross-namespace-reference-invalid
  - secret-full-replace-instead-of-patch
  - credential-invention
confidence: 0.0   # retrospectively; Emily was 0.9 confident at each step
