# Secret-missing-key. Injector deletes a required data key from
# the advocate Secret, simulating a bad merge that dropped a key,
# or a rotation that created a new Secret without preserving the
# full key set.
#
# Origin: AUTONOMY.md Ch 5 (advocate cascade) — the original
# incident wiped 7 keys; this scenario isolates the "one key
# missing" subcase so scoring can attribute correctly.
#
# Pod should fail env resolution; Emily needs to diagnose the
# missing key from event logs, not from the Secret being
# "empty" (AUTONOMY.md mutation-safety rule: decode before
# declaring empty).

id: secret-missing-key-advocate
plane: config
symptom_class: env-resolution-failure
origin: derived-from-advocate-cascade-2026-04-17
difficulty: medium
tier: anchor
status: active
source_tranche: null

injector:
  type: secret-content
  target:
    ns: prod-advocate
    secret: advocate-secrets
  values:
    # Empty-string value = delete the key. Assumes the test
    # fixture set up advocate-secrets with DATABASE_URL,
    # SESSION_SECRET, and ANTHROPIC_API_KEY beforehand.
    SESSION_SECRET: ""
  # Force a pod restart so the Secret change propagates — without
  # this, envFrom'd env vars stay cached at the pod's original boot
  # time and the scenario doesn't bite.
  restart_workloads:
    - kind: Deployment
      name: advocate-api

detector:
  fixed_when:
    - expression: deployment.prod-advocate.advocate-api.readyReplicas == desiredReplicas
      sustained_for_s: 15
  regressed_when: []

scorer:
  time_budget_s: 600
  scope:
    - prod-advocate
  credits:
    detected: 0.2
    diagnosed: 0.3
    fixed: 0.3
    no_regressions: 0.2

ground_truth:
  primary_category: secret-content-mismatch
  # secret-missing is an accepted near-miss: the vocab-broadening on
  # 2026-04-22 made secret-content-mismatch cover the missing-key
  # case, but `secret-missing` still describes this exact scenario
  # in plain language ("a key inside the secret is not present"
  # is the old description). Emily picking the sibling scores
  # half-credit. Fully orthogonalized descriptions land via vocab
  # maintenance, not per-scenario overrides.
  secondary_categories:
    - secret-missing
