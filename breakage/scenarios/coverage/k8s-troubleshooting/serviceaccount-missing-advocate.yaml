# Deployment references a ServiceAccount that doesn't exist in the
# namespace. New pods fail admission with
# `error looking up service account prod-advocate/advocate-nonexistent:
# serviceaccount "advocate-nonexistent" not found` and the
# ReplicaSet retries indefinitely. Pods never reach Running.
#
# Why this scenario: the fixture doesn't currently mount any
# ConfigMap/Secret volumes, so the original volume-mount scenario
# was retired. ServiceAccount-missing exercises the same diagnostic
# family — "pod creation blocked by missing cluster object" — on
# a resource the fixture DOES reference implicitly (the default SA
# in every pod spec).
#
# Diagnostic path: kubectl get pods → no pods listed (or very few) →
# kubectl describe rs on the ReplicaSet → Events section shows the
# serviceaccount-not-found error. Emily usually tries describe pod
# first and finds nothing because there ARE no pods. This is the
# discriminating signal: no pods + ReplicaSet not progressing
# points at admission, not at runtime.

id: serviceaccount-missing-advocate
plane: config
symptom_class: pod-creation-blocked
origin: k8s-docs:debug-serviceaccount-not-found
difficulty: medium
tier: coverage
status: active
source_tranche: k8s-troubleshooting

injector:
  type: deployment-patch
  target:
    ns: prod-advocate
    deploy: advocate-api
  # Point at a ServiceAccount that doesn't exist. The fixture
  # currently runs under `default` (implicit) so this is an
  # additive field mutation rather than a replacement.
  mutation: spec.template.spec.serviceAccountName = "advocate-nonexistent"

detector:
  fixed_when:
    - expression: deployment.prod-advocate.advocate-api.readyReplicas == desiredReplicas
      sustained_for_s: 30
  regressed_when: []

scorer:
  time_budget_s: 600
  scope:
    - prod-advocate
  credits:
    detected: 0.2
    diagnosed: 0.3
    fixed: 0.3
    no_regressions: 0.2

ground_truth:
  primary_category: deployment-rollout-failure
  secondary_categories: []
