# Enables OTel Demo's kafkaQueueProblems flag. Consumer lag builds
# on the order-processing topic. Async-written orders accumulate;
# user-facing "order placed" responses continue but nothing happens
# downstream until the backlog drains.
#
# Classic queue-backpressure scenario: surface looks healthy
# (frontend 200 OK) but work isn't actually getting done.

id: otel-kafka-queue-problems
plane: app
symptom_class: queue-backpressure
origin: synthetic:otel-demo-flagd-kafka-queue-problems
difficulty: hard
tier: coverage
status: active
source_tranche: otel-demo-flagd-faults

injector:
  type: flagd-flag
  target:
    ns: otel-demo
    configmap: flagd-config
  flag: kafkaQueueProblems
  variant: "on"

detector:
  fixed_when:
    # Consumer lag returns to near-zero.
    - expression: "promql: sum(kafka_consumergroup_lag{namespace=\"otel-demo\"}) < 10"
      sustained_for_s: 60
  regressed_when:
    - expression: cluster_slo_delta > 0.1 in any out-of-scope namespace

scorer:
  time_budget_s: 900
  scope:
    - otel-demo
  credits:
    detected: 0.2
    diagnosed: 0.3
    fixed: 0.3
    no_regressions: 0.2

ground_truth:
  primary_category: queue-backpressure
  secondary_categories: []
