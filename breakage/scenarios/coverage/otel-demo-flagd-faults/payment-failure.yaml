# Enables OTel Demo's paymentFailure flag. Payment service returns
# errors; checkout fails at the payment-capture step. Users see
# failed orders.

id: otel-payment-failure
plane: app
symptom_class: payment-processing-errors
origin: synthetic:otel-demo-flagd-payment-failure
difficulty: easy
tier: coverage
status: active
source_tranche: otel-demo-flagd-faults

injector:
  type: flagd-flag
  target:
    ns: otel-demo
    configmap: flagd-config
  flag: paymentFailure
  variant: "on"

detector:
  fixed_when:
    - expression: error_rate{ns=otel-demo} < 0.005
      sustained_for_s: 60
  regressed_when:
    - expression: cluster_slo_delta > 0.1 in any out-of-scope namespace

scorer:
  time_budget_s: 600
  scope:
    - otel-demo
  credits:
    detected: 0.2
    diagnosed: 0.3
    fixed: 0.3
    no_regressions: 0.2

ground_truth:
  primary_category: application-error-uncaught-exception
  secondary_categories: []
